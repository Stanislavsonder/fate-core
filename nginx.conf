server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 1024;

    # Serve pre-compressed .gz files produced by Vite's build
    gzip_static on;

    # Cache hashed static assets aggressively (Vite fingerprints them)
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must never be cached
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Workbox runtime should also not be cached long-term
    location ~* /workbox- {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # PWA manifest — short cache so installs pick up updates
    location = /site.webmanifest {
        expires 1d;
        add_header Cache-Control "public";
    }

    # SPA fallback: all unmatched paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
