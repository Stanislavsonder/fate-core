services:
  fate-core:
    build:
      context: .
      dockerfile: Dockerfile
    image: fate-core:latest
    container_name: fate-core
    restart: unless-stopped
    ports:
      - '8080:80'
    networks:
      - proxy_network
    labels:
      - 'com.docker.compose.project=fate-core'

networks:
  proxy_network:
    external: true
